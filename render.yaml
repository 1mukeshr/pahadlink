# One-click: https://render.com/deploy?repo=https://github.com/1mukeshr/uk-ecommerce
# Or: Render → New → Blueprint → this repo
# Set MONGODB_URI from Atlas, e.g.
# mongodb+srv://USER:PASS@cluster.mongodb.net/Pahadi_link?retryWrites=true&w=majority
services:
  - type: web
    name: pahadlink-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://1mukeshr.github.io
      - key: ADMIN_EMAIL
        value: admin@pahadlink.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
