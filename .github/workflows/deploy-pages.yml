# Deploy frontend to GitHub Pages
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Resolve API URL for Pages build
        id: api
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::warning::Secret VITE_API_URL is not set. Storefront will deploy, but login/register need a hosted API."
            echo "Add secret VITE_API_URL = https://YOUR-SERVICE.onrender.com/api then redeploy."
            echo "has_api=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$VITE_API_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::VITE_API_URL must start with http:// or https://"
              exit 1
              ;;
          esac
          echo "Using hosted API: $VITE_API_URL"
          echo "has_api=true" >> "$GITHUB_OUTPUT"
      - name: Check API health
        if: steps.api.outputs.has_api == 'true'
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        continue-on-error: true
        run: |
          HEALTH_URL="${VITE_API_URL%/}/health"
          echo "GET $HEALTH_URL"
          curl -fsS --max-time 60 "$HEALTH_URL" || echo "::warning::API health check failed (service may be sleeping). Pages build continues."
      - name: Build for GitHub Pages
        env:
          # Optional until Render API is live: VITE_API_URL = https://YOUR-API.onrender.com/api
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
