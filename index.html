<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-48.png" type="image/png" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PahadLink — Pure Himalayan Goods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family: Outfit, Manrope, system-ui, sans-serif;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.55s ease,
          visibility 0.55s ease,
          transform 0.55s ease;
        will-change: opacity, transform;
      }

      .boot-loader.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: scale(1.02);
      }

      .boot-loader__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0;
        padding: 24px;
      }

      .boot-loader__logo {
        display: block;
        width: min(260px, 72vw);
        height: auto;
        margin: 0 0 28px;
        opacity: 0;
        transform: translateY(8px) scale(0.98);
        animation: bootIn 0.55s ease 0.08s forwards;
      }

      .boot-loader__bar {
        width: 120px;
        height: 3px;
        border-radius: 999px;
        background: #f0e4ea;
        overflow: hidden;
        opacity: 0;
        animation: bootIn 0.45s ease 0.28s forwards;
      }

      .boot-loader__bar span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: #e62978;
        animation: bootBar 1.1s ease-in-out infinite;
      }

      @keyframes bootIn {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes bootBar {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loader,
        .boot-loader.is-done {
          transition: opacity 0.2s ease, visibility 0.2s ease;
          transform: none;
        }

        .boot-loader__logo,
        .boot-loader__bar {
          animation: none;
          opacity: 1;
          transform: none;
        }

        .boot-loader__bar span {
          animation: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" class="boot-loader" role="status" aria-live="polite" aria-busy="true">
      <div class="boot-loader__inner">
        <img class="boot-loader__logo" src="/logo.png" alt="PahadLink" width="260" height="66" />
        <div class="boot-loader__bar" aria-hidden="true">
          <span></span>
        </div>
      </div>
      <span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
        Loading PahadLink
      </span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
